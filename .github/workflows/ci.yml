name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and test
    runs-on: macos-15
    timeout-minutes: 45
    env:
      XCODEGEN_VERSION: 2.46.0
      XCODEGEN_SHA256: 4d9e34b62172d645eed6457cac13fc222569974098ef4ee9c3368bedf0196806

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify Apple silicon runner
        run: test "$(uname -m)" = arm64

      - name: Install pinned Gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: b40ab0ae55c505963e365f271a8d3846efbc170aa17f2607f13df610a9aeb6a5
        run: |
          archive="$RUNNER_TEMP/gitleaks.tar.gz"
          curl -fsSL --retry 3 \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_darwin_arm64.tar.gz" \
            -o "$archive"
          printf '%s  %s\n' "$GITLEAKS_SHA256" "$archive" | shasum -a 256 -c -
          tar -xzf "$archive" -C "$RUNNER_TEMP" gitleaks
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Scan Git history for secrets
        run: gitleaks git --redact --no-banner .

      - name: Install pinned XcodeGen
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/xcodegen.zip"
          install_dir="$RUNNER_TEMP/xcodegen"
          url="https://github.com/yonaskolb/XcodeGen/releases/download/${XCODEGEN_VERSION}/xcodegen.zip"

          curl -fsSL --retry 3 --output "$archive" "$url"
          printf '%s  %s\n' "$XCODEGEN_SHA256" "$archive" | shasum -a 256 -c -
          ditto -x -k "$archive" "$install_dir"
          echo "$install_dir/xcodegen/bin" >> "$GITHUB_PATH"
          "$install_dir/xcodegen/bin/xcodegen" --version

      - name: Validate shell scripts
        run: bash -n Scripts/*.sh

      - name: Build public checkout and run tests
        run: ./Scripts/build-local.sh --test

      - name: Smoke-test production app storage wiring
        timeout-minutes: 2
        run: ./Scripts/test-app-storage-isolation.sh --app build/local/Dump.app

      - name: Smoke-test bundled qmd runtime
        timeout-minutes: 5
        run: ./Scripts/test-qmd-integration.sh --app build/local/Dump.app --skip-embed

      - name: Audit runtime dependencies
        working-directory: Runtime/qmd
        run: npm audit --omit=dev --audit-level=high
