name: Dump

options:
  bundleIdPrefix: com.joshmyatt
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  developmentLanguage: en
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "0.1.3"
    CURRENT_PROJECT_VERSION: "6"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEAD_CODE_STRIPPING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: NO
    EXCLUDED_ARCHS: x86_64

packages:
  HotKey:
    url: https://github.com/soffes/HotKey
    exactVersion: 0.2.1
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: 2.9.1
  Wave:
    url: https://github.com/jtrivedi/Wave
    exactVersion: 0.3.4

targets:
  Dump:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Resources
        excludes:
          - Info.plist
          - Dump.entitlements
          - Node.entitlements
        buildPhase: resources
    preBuildScripts:
      - name: Fetch bundled Node + qmd runtime
        script: |
          set -e
          if [ -z "${SRCROOT:-}" ]; then SRCROOT="${PROJECT_DIR:-$PWD}"; fi
          "${SRCROOT}/Scripts/fetch-runtime.sh"
        inputFiles:
          - $(SRCROOT)/Scripts/fetch-runtime.sh
          - $(SRCROOT)/Runtime/qmd/package.json
          - $(SRCROOT)/Runtime/qmd/package-lock.json
        outputFiles:
          - $(SRCROOT)/Runtime/qmd/node_modules/.runtime-ready
          - $(SRCROOT)/Runtime/node/bin/node
          - $(SRCROOT)/Runtime/qmd/node_modules/@tobilu/qmd/dist/cli/qmd.js
        basedOnDependencyAnalysis: true
      - name: Copy Runtime into app bundle
        script: |
          set -e
          if [ -z "${SRCROOT:-}" ]; then SRCROOT="${PROJECT_DIR:-$PWD}"; fi
          DEST="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/runtime"
          mkdir -p "$DEST"
          rsync -a --delete \
                --exclude "node_modules/.cache" \
                --exclude ".npm" \
                "${SRCROOT}/Runtime/" "$DEST/"
        inputFiles:
          - $(SRCROOT)/Runtime/qmd/node_modules/.runtime-ready
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/runtime/qmd/node_modules/.runtime-ready
          - $(BUILT_PRODUCTS_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/runtime/node/bin/node
        basedOnDependencyAnalysis: true
    dependencies:
      - package: HotKey
      - package: Sparkle
      - package: Wave
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: Dump
        CFBundleDisplayName: Dump
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSUIElement: true
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        CADisableMinimumFrameDuration: true
        NSHumanReadableCopyright: Copyright © 2026 Joshua Myatt
        LSApplicationCategoryType: public.app-category.productivity
        SUFeedURL: https://myattj.github.io/dump-updates/appcast.xml
        SUEnableInstallerLauncherService: true
        SUPublicEDKey: CSXW1L8m4x/hSs0Bh7OuArx/DnL3UWh6245lvVkhvZ4=
    entitlements:
      path: Resources/Dump.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joshmyatt.dump
        PRODUCT_NAME: Dump
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Dump.entitlements
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""

  DumpTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Dump
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joshmyatt.dump.tests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Dump.app/Contents/MacOS/Dump
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Dump:
    build:
      targets:
        Dump: all
        DumpTests: [test]
    test:
      targets:
        - DumpTests
      gatherCoverageData: true
    run:
      config: Debug
    archive:
      config: Release
